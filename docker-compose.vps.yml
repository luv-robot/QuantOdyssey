services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/auth.caddy:/etc/caddy/auth.caddy:ro
      - ./public:/srv/public:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
      prefect:
        condition: service_started
      n8n:
        condition: service_started

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      POSTGRES_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      QDRANT_URL: http://qdrant:6333
      PREFECT_API_URL: http://prefect:4200/api
      N8N_URL: http://n8n:5678
      FREQTRADE_BIN: freqtrade
      FREQTRADE_USER_DATA: /app/freqtrade_user_data
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - ./configs:/app/configs:ro
      - freqtrade_data:/app/freqtrade_user_data/data
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started

  prefect-scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: python scripts/prefect_daily_market_data_flow.py
    environment:
      DATABASE_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      POSTGRES_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      QDRANT_URL: http://qdrant:6333
      PREFECT_API_URL: http://prefect:4200/api
      N8N_URL: http://n8n:5678
      FREQTRADE_BIN: freqtrade
      FREQTRADE_USER_DATA: /app/freqtrade_user_data
      MARKET_SIGNAL_MIN_RANK: ${MARKET_SIGNAL_MIN_RANK:-1}
    volumes:
      - ./configs:/app/configs:ro
      - freqtrade_data:/app/freqtrade_user_data/data
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      prefect:
        condition: service_started

  orderflow-collector:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: python scripts/continuous_orderflow_collector.py
    environment:
      DATABASE_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      POSTGRES_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      ORDERFLOW_SYMBOLS: "${ORDERFLOW_SYMBOLS:-BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT}"
      ORDERFLOW_TRADING_MODE: "${ORDERFLOW_TRADING_MODE:-futures}"
      ORDERFLOW_POLL_SECONDS: "${ORDERFLOW_POLL_SECONDS:-60}"
      ORDERFLOW_LIMIT: "${ORDERFLOW_LIMIT:-1000}"
      ORDERFLOW_MAX_PAGES_PER_SYMBOL: "${ORDERFLOW_MAX_PAGES_PER_SYMBOL:-5}"
      ORDERFLOW_BAR_INTERVAL: "${ORDERFLOW_BAR_INTERVAL:-1m}"
      ORDERFLOW_STATE_PATH: "${ORDERFLOW_STATE_PATH:-/app/logs/orderflow_collector_state.json}"
    volumes:
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy

  orderflow-validation-scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: python scripts/prefect_orderflow_validation_flow.py
    environment:
      DATABASE_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      POSTGRES_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      PREFECT_API_URL: http://prefect:4200/api
      ORDERFLOW_SYMBOLS: "${ORDERFLOW_SYMBOLS:-BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT}"
      ORDERFLOW_BAR_INTERVAL: "${ORDERFLOW_BAR_INTERVAL:-1m}"
      ORDERFLOW_TRADING_MODE: "${ORDERFLOW_TRADING_MODE:-futures}"
      ORDERFLOW_MAX_STALENESS_SECONDS: "${ORDERFLOW_MAX_STALENESS_SECONDS:-600}"
      ORDERFLOW_STATE_PATH: "${ORDERFLOW_STATE_PATH:-/app/logs/orderflow_collector_state.json}"
      ORDERFLOW_VALIDATION_CRON: "${ORDERFLOW_VALIDATION_CRON:-15 */6 * * *}"
      ORDERFLOW_VALIDATION_TIMEFRAMES: "${ORDERFLOW_VALIDATION_TIMEFRAMES:-1h}"
      ORDERFLOW_VALIDATION_MIN_EVENTS_WITH_ORDERFLOW: "${ORDERFLOW_VALIDATION_MIN_EVENTS_WITH_ORDERFLOW:-30}"
    volumes:
      - ./configs:/app/configs:ro
      - freqtrade_data:/app/freqtrade_user_data/data
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      prefect:
        condition: service_started
      orderflow-collector:
        condition: service_started

  harness-runner-scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: python scripts/prefect_harness_runner_flow.py
    environment:
      DATABASE_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      POSTGRES_URL: postgresql+psycopg://quant:${POSTGRES_PASSWORD:-quant}@postgres:5432/quant_odyssey
      QDRANT_URL: http://qdrant:6333
      PREFECT_API_URL: http://prefect:4200/api
      ORDERFLOW_SYMBOLS: "${ORDERFLOW_SYMBOLS:-BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT}"
      HARNESS_RUNNER_CRON: "${HARNESS_RUNNER_CRON:-45 */2 * * *}"
      HARNESS_RUNNER_SYMBOLS: "${HARNESS_RUNNER_SYMBOLS:-BTC/USDT:USDT,ETH/USDT:USDT,SOL/USDT:USDT}"
      HARNESS_RUNNER_TIMEFRAMES: "${HARNESS_RUNNER_TIMEFRAMES:-5m,15m,1h}"
      HARNESS_RUNNER_DATA_DIR: "${HARNESS_RUNNER_DATA_DIR:-freqtrade_user_data/data/binance/futures}"
      HARNESS_RUNNER_SCRATCHPAD_DIR: "${HARNESS_RUNNER_SCRATCHPAD_DIR:-/app/logs/harness_scratchpad}"
      HARNESS_RUNNER_MAX_TASKS: "${HARNESS_RUNNER_MAX_TASKS:-4}"
      HARNESS_RUNNER_MAX_QUEUE_SCAN: "${HARNESS_RUNNER_MAX_QUEUE_SCAN:-30}"
      HARNESS_RUNNER_MAX_CANDLES: "${HARNESS_RUNNER_MAX_CANDLES:-5000}"
      HARNESS_RUNNER_MAX_TRIALS: "${HARNESS_RUNNER_MAX_TRIALS:-40}"
      HARNESS_RUNNER_MIN_TRADE_COUNT: "${HARNESS_RUNNER_MIN_TRADE_COUNT:-10}"
      HARNESS_RUNNER_MONTE_CARLO_SIMULATIONS: "${HARNESS_RUNNER_MONTE_CARLO_SIMULATIONS:-80}"
      HARNESS_RUNNER_MONTE_CARLO_HORIZON_TRADES: "${HARNESS_RUNNER_MONTE_CARLO_HORIZON_TRADES:-20}"
      HARNESS_RUNNER_WALK_FORWARD_MIN_TRADES_PER_WINDOW: "${HARNESS_RUNNER_WALK_FORWARD_MIN_TRADES_PER_WINDOW:-10}"
    volumes:
      - ./configs:/app/configs:ro
      - freqtrade_data:/app/freqtrade_user_data/data
      - app_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      prefect:
        condition: service_started

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: quant_odyssey
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_odyssey"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  prefect:
    image: prefecthq/prefect:2-latest
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_URL: http://127.0.0.1:4200/api
      PREFECT_UI_API_URL: http://127.0.0.1:4200/api
    ports:
      - "127.0.0.1:4200:4200"
    volumes:
      - prefect_data:/root/.prefect

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      GENERIC_TIMEZONE: Asia/Shanghai
      TZ: Asia/Shanghai
      N8N_HOST: ${N8N_HOST:-quantodyssey.com}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_HOST:-quantodyssey.com}/
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/files/n8n:ro

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  qdrant_data:
  prefect_data:
  n8n_data:
  freqtrade_data:
  app_logs:
